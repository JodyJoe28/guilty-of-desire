<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Guilty of Desire</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="signup-body">

  <section class="signup-page">

    <div class="signup-hero">
      <h1 class="smoke-title">Guilty of Desire</h1>
      <p class="signup-subtitle">Create your account to enter the experience.</p>
    </div>

    <form class="signup-form" id="signupForm">
      <input type="text" id="name" placeholder="Enter your name" required>
      <input type="tel" id="phone" placeholder="Enter your phone number" required>
      <input type="email" id="email" placeholder="Enter your email" required>

      <button type="submit" class="glow-signup-button">Sign Up</button>
    </form>

  </section>

  <script src="script.js"></script>
</body>
</html>
@media (max-width: 768px) {
  .smoke-title {
    font-size: 38px;
    letter-spacing: 3px;
  }

  .signup-form {
    padding: 25px;
  }

  .signup-subtitle {
    font-size: 13px;
  }
